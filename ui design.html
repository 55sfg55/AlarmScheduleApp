
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm App · Full Mockup</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #131820;
      --surface2: #1c2330;
      --border: #2a3240;
      --text: #e2e8f0;
      --text2: #8f9bb5;
      --accent: #5e9eff;
      --accent2: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      user-select: none;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 270px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 20;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alarm-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .alarm-item {
      padding: 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: var(--transition);
    }
    .alarm-item:hover { background: var(--surface2); }
    .alarm-item.selected { background: var(--surface2); border-color: var(--accent); }
    .alarm-item .time { font-size: 1.3rem; font-weight: 700; }
    .alarm-item .meta { font-size: 0.7rem; color: var(--text2); display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .badge {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600;
      background: #1e293b; color: #94a3b8;
    }
    .badge.chain { background: #3e2d0a; color: #fbbf24; }
    .badge.disabled { background: #3a1010; color: #f87171; }
    .add-btn {
      margin: 8px; padding: 10px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 0.9rem;
      transition: var(--transition);
    }
    .add-btn:hover { filter: brightness(1.15); }

    /* ── MAIN ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .topbar {
      padding: 8px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .mode-switch, .timefmt-switch {
      display: flex; background: var(--surface2); border-radius: 20px; overflow: hidden; border: 1px solid var(--border);
    }
    .mode-switch button, .timefmt-switch button {
      padding: 6px 14px; border: none; background: transparent; color: var(--text2);
      cursor: pointer; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.5px; transition: var(--transition);
    }
    .mode-switch button.active, .timefmt-switch button.active { background: var(--accent); color: #fff; }
    .topbar .label { font-size: 0.75rem; color: var(--text2); font-weight: 600; }
    .spacer { flex: 1; }

    .content-area {
      flex: 1; display: flex; overflow: hidden; padding: 16px; gap: 16px; flex-wrap: wrap;
    }

    /* ── EDITOR PANEL ── */
    .editor-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px; flex: 1.5; min-width: 340px; overflow-y: auto; box-shadow: var(--shadow);
    }
    .section-title {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent);
      margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px;
    }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 140px; margin-bottom: 10px; }
    .form-group label { display: block; font-size: 0.7rem; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 0.85rem; font-family: var(--font);
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 0.8rem; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      padding: 8px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 0.8rem; transition: var(--transition); font-family: var(--font);
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.2); }
    .btn-test { background: var(--accent2); color: #000; font-weight: 700; }
    .btn-test:hover { filter: brightness(1.2); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* ── PREVIEW PANEL ── */
    .preview-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      flex: 1; min-width: 280px; display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .app-view-box {
      width: 100%; height: 100%; border-radius: var(--radius); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      border: 2px dashed var(--border); position: relative;
    }

    /* ── ALARM OVERLAY ── */
    .alarm-overlay {
      position: absolute; inset: 0; background: var(--surface); display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 30; animation: fadeSlide 0.3s ease; border-radius: var(--radius);
    }
    @keyframes fadeSlide { from { opacity: 0; transform: scale(0.95); } }
    .alarm-overlay .icon { font-size: 3rem; margin-bottom: 12px; }
    .alarm-overlay .time { font-size: 2.5rem; font-weight: 700; }
    .alarm-overlay .sub { color: var(--text2); font-size: 0.85rem; margin: 4px 0 16px; }
    .sound-indicator { display: flex; align-items: center; gap: 6px; color: var(--warning); font-size: 0.8rem; margin-bottom: 16px; }

    /* ── SCREEN SPECIFIC STYLES ── */
    .screen-simple .dismiss-btn {
      padding: 14px 40px; font-size: 1.1rem; font-weight: 700; border: none;
      border-radius: 30px; cursor: pointer; background: var(--accent); color: #fff;
    }
    .screen-simple.disabled .dismiss-btn { background: #555; pointer-events: none; opacity: 0.6; }
    .screen-swipe .swipe-track {
      background: var(--surface2); border-radius: 30px; height: 52px; position: relative;
      overflow: hidden; cursor: grab; border: 1px solid var(--border); width: 100%; max-width: 300px;
    }
    .swipe-thumb {
      position: absolute; left: 3px; top: 3px; height: 44px; width: 44px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.2rem; transition: left 0.1s ease-out;
    }
    .swipe-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text2); font-weight: 600; pointer-events: none; }
    .screen-hold .hold-btn {
      width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent);
      background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
      position: relative; font-weight: 700;
    }
    .screen-hold .progress-ring circle { fill: none; stroke: var(--accent2); stroke-width: 3; }
    .screen-pattern .pattern-grid { display: grid; grid-template-columns: repeat(3, 50px); gap: 8px; }
    .pattern-dot {
      width: 50px; height: 50px; border-radius: 50%; background: var(--surface2);
      border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .pattern-dot.tapped { background: var(--accent); border-color: var(--accent); color: #fff; pointer-events: none; }
    .screen-between {
      text-align: center; font-size: 1rem; color: var(--text2);
    }
    .screen-between .between-msg { font-weight: 600; color: var(--warning); font-size: 1.1rem; margin: 8px 0; }

    /* ── LOG PANEL ── */
    .log-panel {
      background: var(--surface); border-top: 1px solid var(--border); max-height: 140px;
      overflow-y: auto; padding: 8px 16px; font-size: 0.75rem; display: none;
      color: var(--text2); flex-shrink: 0;
    }
    .log-panel.show { display: block; }
    .log-entry { margin-bottom: 4px; border-bottom: 1px solid var(--border); padding: 4px 0; }
    .log-time { color: var(--accent); margin-right: 8px; }
    .log-msg { color: var(--text); }
    .log-toggle { cursor: pointer; font-size: 0.75rem; color: var(--accent); font-weight: 600; }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; max-height: 35vh; }
      .content-area { flex-direction: column; }
      .preview-panel { min-height: 250px; }
    }
  </style>
</head>
<body>
  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">⏰ Alarm Editor</div>
    <div class="alarm-list" id="alarmList"></div>
    <button class="add-btn" id="addAlarmBtn">+ New Alarm</button>
  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <div class="main">
    <div class="topbar">
      <span class="label">Platform:</span>
      <div class="mode-switch" id="platformSwitch">
        <button class="active" data-mode="desktop">🖥 Desktop</button>
        <button data-mode="android">📱 Android</button>
      </div>
      <span class="label">Clock:</span>
      <div class="timefmt-switch" id="timeFormatSwitch">
        <button class="active" data-format="24h">24h</button>
        <button data-format="12h">12h</button>
      </div>
      <span class="spacer"></span>
      <span class="log-toggle" id="logToggleBtn">📋 Log</span>
    </div>

    <div class="content-area">
      <!-- Editor -->
      <div class="editor-panel" id="editorPanel">
        <div id="editorContent">Select an alarm to edit.</div>
      </div>
      <!-- Preview -->
      <div class="preview-panel" id="previewPanel">
        <div class="app-view-box" id="previewBox">
          <span style="color:var(--text2)">Screen Preview</span>
        </div>
      </div>
    </div>

    <!-- Log panel -->
    <div class="log-panel show" id="logPanel"></div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="soundFileInput" accept="audio/*" style="display:none;">

  <script>
    (function() {
      // ═══════════════════════════════════════
      // SCREEN REGISTRY (simulating external files)
      // In production, each screen would be a separate .html/.css/.js file loaded dynamically.
      // ═══════════════════════════════════════
      const ScreenRegistry = {
        _screens: {},

        register(screenDef) {
          this._screens[screenDef.id] = screenDef;
        },

        get(id) {
          return this._screens[id] || null;
        },

        getAll() {
          return Object.values(this._screens);
        },

        // Placeholder for future dynamic loader
        async loadFromFile(screenId, url) {
          // fetch HTML, CSS, JS and register...
          console.log(`[ScreenRegistry] Would load screen "${screenId}" from ${url}`);
        }
      };

      // Register built-in screens
      ScreenRegistry.register({
        id: 'simple-dismiss',
        label: 'Simple Button',
        icon: '🔘',
        render(container, context) {
          container.innerHTML = `<div class="screen-simple ${context.disabled?'disabled':''}"><button class="dismiss-btn">Dismiss</button></div>`;
          const btn = container.querySelector('.dismiss-btn');
          if(btn && !context.disabled) {
            btn.addEventListener('click', () => context.onAction('button'));
          }
        },
        cleanup(container) { container.innerHTML = ''; }
      });

      ScreenRegistry.register({
        id: 'swipe-dismiss',
        label: 'Swipe Right',
        icon: '👆',
        render(container, context) {
          container.innerHTML = `<div class="screen-swipe"><div class="swipe-track"><div class="swipe-thumb">➤</div><div class="swipe-label">Swipe →</div></div></div>`;
          if(context.disabled) return;
          const track = container.querySelector('.swipe-track');
          const thumb = container.querySelector('.swipe-thumb');
          const label = track.querySelector('.swipe-label');
          let dragging = false, startX = 0, thumbLeft = 3;
          const maxLeft = track.clientWidth - thumb.clientWidth - 6;
          function reset() { thumbLeft = 3; thumb.style.left = '3px'; track.classList.remove('swiped'); label.textContent = 'Swipe →'; }
          function onStart(e) {
            if(context.disabled) return;
            dragging = true;
            startX = (e.touches ? e.touches[0].clientX : e.clientX) - thumbLeft;
          }
          function onMove(e) {
            if(!dragging) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            thumbLeft = Math.max(3, Math.min(cx - startX, maxLeft));
            thumb.style.left = thumbLeft + 'px';
            if(thumbLeft > maxLeft*0.7) { track.classList.add('swiped'); label.textContent = 'Release ✓'; }
            else { track.classList.remove('swiped'); label.textContent = 'Swipe →'; }
          }
          function onEnd() {
            if(!dragging) return;
            dragging = false;
            if(thumbLeft > maxLeft*0.7) {
              thumb.style.left = maxLeft+'px'; track.classList.add('swiped');
              setTimeout(() => context.onAction('swipe'), 300);
            } else reset();
          }
          thumb.addEventListener('mousedown', onStart);
          thumb.addEventListener('touchstart', onStart, {passive: false});
          window.addEventListener('mousemove', onMove);
          window.addEventListener('touchmove', onMove, {passive: false});
          window.addEventListener('mouseup', onEnd);
          window.addEventListener('touchend', onEnd);
          container._swipeCleanup = () => {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('mouseup', onEnd);
            window.removeEventListener('touchend', onEnd);
          };
          reset();
        },
        cleanup(container) { if(container._swipeCleanup) container._swipeCleanup(); container.innerHTML = ''; }
      });

      ScreenRegistry.register({
        id: 'hold-dismiss',
        label: 'Hold 2s',
        icon: '⏱️',
        render(container, context) {
          container.innerHTML = `<div class="screen-hold"><button class="hold-btn"><svg class="progress-ring" width="86" height="86" viewBox="0 0 86 86"><circle cx="43" cy="43" r="40"/></svg>HOLD</button></div>`;
          if(context.disabled) return;
          const btn = container.querySelector('.hold-btn');
          const circle = btn.querySelector('circle');
          const circ = 2 * Math.PI * 40;
          circle.style.strokeDasharray = circ;
          circle.style.strokeDashoffset = circ;
          let timer, start;
          btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            start = Date.now();
            circle.style.strokeDashoffset = circ;
            timer = setInterval(() => {
              const p = Math.min((Date.now()-start)/2000, 1);
              circle.style.strokeDashoffset = circ * (1-p);
              if(p>=1) { clearInterval(timer); context.onAction('hold'); }
            }, 50);
          });
          const cancel = () => { if(timer) clearInterval(timer); circle.style.strokeDashoffset = circ; };
          btn.addEventListener('mouseup', cancel);
          btn.addEventListener('mouseleave', cancel);
          container._holdCleanup = cancel;
        },
        cleanup(container) { if(container._holdCleanup) container._holdCleanup(); container.innerHTML = ''; }
      });

      ScreenRegistry.register({
        id: 'pattern-dismiss',
        label: 'Tap 1-2-3',
        icon: '🔢',
        render(container, context) {
          container.innerHTML = `<div class="screen-pattern"><div class="pattern-grid">${[1,2,3].map(n=>`<div class="pattern-dot" data-n="${n}">${n}</div>`).join('')}</div></div>`;
          if(context.disabled) return;
          const seq = [1,2,3]; let step = 0;
          container.querySelectorAll('.pattern-dot').forEach(dot => {
            dot.addEventListener('click', () => {
              if(parseInt(dot.dataset.n) === seq[step]) {
                dot.classList.add('tapped'); step++;
                if(step >= seq.length) context.onAction('pattern');
              } else {
                dot.classList.add('wrong'); setTimeout(()=>dot.classList.remove('wrong'),400);
                step=0; container.querySelectorAll('.pattern-dot').forEach(d=>d.classList.remove('tapped'));
              }
            });
          });
        },
        cleanup(container) { container.innerHTML = ''; }
      });

      // Special between-screen
      ScreenRegistry.register({
        id: 'between-message',
        label: 'Between Alarms',
        icon: '⏳',
        render(container, context) {
          container.innerHTML = `<div class="screen-between"><p>Now between</p><p class="between-msg">"${context.betweenSource || '?'}"</p><p>and</p><p class="between-msg">"${context.betweenTarget || '?'}"</p></div>`;
        },
        cleanup(container) { container.innerHTML = ''; }
      });

      // ═══════════════════════════════════════
      // GLOBAL STATE
      // ═══════════════════════════════════════
      let alarms = [];
      let selectedAlarmId = null;
      let currentPlatform = 'desktop'; // 'desktop' | 'android'
      let timeFormat = '24h'; // '24h' | '12h'
      let logEntries = [];
      let activeAlarmOverlay = null;   // alarm currently shown in overlay
      let betweenTimeout = null;       // timer for chained between-screen

      // Settings persistence
      function loadSettings() {
        const s = localStorage.getItem('alarmAppSettings');
        if(s) try { const p = JSON.parse(s); timeFormat = p.timeFormat || '24h'; } catch(e){}
      }
      function saveSettings() {
        localStorage.setItem('alarmAppSettings', JSON.stringify({timeFormat}));
      }

      // ═══════════════════════════════════════
      // HELPER: TIME FORMATTING
      // ═══════════════════════════════════════
      function formatTime(hhmm) {
        if(!hhmm || hhmm.length!==5) return hhmm;
        const [h, m] = hhmm.split(':').map(Number);
        if(timeFormat === '12h') {
          const ampm = h >= 12 ? 'PM' : 'AM';
          const h12 = h % 12 || 12;
          return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
        }
        return hhmm;
      }

      // ═══════════════════════════════════════
      // ALARM DATA (migration & defaults)
      // ═══════════════════════════════════════
      function createDefaultAlarms() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String((now.getMinutes()+2)%60).padStart(2,'0');
        return [
          {
            id: 'a1', label: 'Morning', time: '07:00', triggerType: 'specific',
            afterEventSource: '', afterEventDelay: 5,
            screens: {
              desktop: { primary: 'simple-dismiss', secondary: '', between: '' },
              android: { primary: 'swipe-dismiss', secondary: '', between: '' }
            },
            soundFileName: 'chime.mp3', disableAfterAction: true, logMessage: 'Morning alarm dismissed',
            showBetweenScreen: false, enabled: true
          },
          {
            id: 'a2', label: 'Reminder', time: '08:30', triggerType: 'specific',
            afterEventSource: '', afterEventDelay: 3,
            screens: {
              desktop: { primary: 'hold-dismiss', secondary: 'simple-dismiss', between: '' },
              android: { primary: 'hold-dismiss', secondary: 'swipe-dismiss', between: '' }
            },
            soundFileName: 'alert.wav', disableAfterAction: false, logMessage: 'Reminder done',
            showBetweenScreen: false, enabled: true
          },
          {
            id: 'a3', label: 'Chained after Morning', time: '', triggerType: 'after-event',
            afterEventSource: 'a1', afterEventDelay: 2,
            screens: {
              desktop: { primary: 'pattern-dismiss', secondary: '', between: 'between-message' },
              android: { primary: 'simple-dismiss', secondary: '', between: 'between-message' }
            },
            soundFileName: 'reminder.mp3', disableAfterAction: true, logMessage: 'Chained alarm fired',
            showBetweenScreen: true, enabled: true
          }
        ];
      }

      function migrateAlarm(alarm) {
        // Ensure screens object exists
        if (!alarm.screens) {
          alarm.screens = {
            desktop: { primary: alarm.screenDesktop || 'simple-dismiss', secondary: '', between: '' },
            android: { primary: alarm.screenAndroid || 'swipe-dismiss', secondary: '', between: '' }
          };
          delete alarm.screenDesktop;
          delete alarm.screenAndroid;
        }
        if (!alarm.showBetweenScreen) alarm.showBetweenScreen = false;
        if (!alarm.logMessage) alarm.logMessage = '';
        return alarm;
      }

      function loadAlarms() {
        const saved = localStorage.getItem('alarmAppData');
        if(saved) {
          try { alarms = JSON.parse(saved).map(migrateAlarm); } catch(e) { alarms = createDefaultAlarms(); }
        } else {
          alarms = createDefaultAlarms();
        }
        saveAlarms();
      }
      function saveAlarms() { localStorage.setItem('alarmAppData', JSON.stringify(alarms)); }

      // ═══════════════════════════════════════
      // LOGGING
      // ═══════════════════════════════════════
      function addLogEntry(message) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        logEntries.unshift({ time: timeStr, msg: message });
        if(logEntries.length > 100) logEntries.pop();
        renderLog();
      }
      function renderLog() {
        const panel = document.getElementById('logPanel');
        if(!panel) return;
        panel.innerHTML = logEntries.length ? logEntries.map(e => `<div class="log-entry"><span class="log-time">${e.time}</span><span class="log-msg">${e.msg}</span></div>`).join('') : '<div style="color:var(--text2)">No log entries yet.</div>';
      }

      // ═══════════════════════════════════════
      // UI: ALARM LIST
      // ═══════════════════════════════════════
      function renderAlarmList() {
        const list = document.getElementById('alarmList');
        list.innerHTML = alarms.map(a => {
          const primaryScreen = a.screens[currentPlatform]?.primary || 'simple-dismiss';
          const screenLabel = (ScreenRegistry.get(primaryScreen) || {}).label || primaryScreen;
          const timeDisplay = a.triggerType === 'specific' ? formatTime(a.time) : '⛓ Chained';
          return `
            <div class="alarm-item ${a.id===selectedAlarmId?'selected':''}" data-id="${a.id}">
              <div class="time">${timeDisplay}</div>
              <div style="font-weight:600; font-size:0.85rem;">${a.label||'Unnamed'}</div>
              <div class="meta">
                <span class="badge">${screenLabel}</span>
                ${a.triggerType==='after-event'?'<span class="badge chain">chain</span>':''}
                ${!a.enabled?'<span class="badge disabled">off</span>':''}
              </div>
            </div>`;
        }).join('');
        document.querySelectorAll('.alarm-item').forEach(el => {
          el.addEventListener('click', () => selectAlarm(el.dataset.id));
        });
      }

      function selectAlarm(id) {
        selectedAlarmId = id;
        renderAlarmList();
        renderEditor();
        updatePreview();
      }

      // ═══════════════════════════════════════
      // EDITOR
      // ═══════════════════════════════════════
      function renderEditor() {
        const alarm = alarms.find(a => a.id === selectedAlarmId);
        const container = document.getElementById('editorContent');
        if(!alarm) { container.innerHTML = '<p style="color:var(--text2)">Select an alarm.</p>'; return; }

        const screenOptions = ScreenRegistry.getAll().map(s => `<option value="${s.id}">${s.icon} ${s.label}</option>`).join('');
        const eventSources = alarms.filter(a => a.id !== alarm.id).map(a => `<option value="${a.id}" ${alarm.afterEventSource===a.id?'selected':''}>Alarm: ${a.label||a.time}</option>`).join('') +
                            alarms.map(a => `<option value="button-click:${a.id}" ${alarm.afterEventSource==='button-click:'+a.id?'selected':''}>Button click on: ${a.label||a.time}</option>`).join('');

        const screens = alarm.screens || {};
        const desk = screens.desktop || {primary:'simple-dismiss', secondary:'', between:''};
        const andr = screens.android || {primary:'swipe-dismiss', secondary:'', between:''};

        container.innerHTML = `
          <div class="section-title">Basic</div>
          <div class="form-row">
            <div class="form-group"><label>Label</label><input type="text" id="editLabel" value="${alarm.label||''}"></div>
            <div class="form-group"><label>Trigger</label><select id="editTrigger">
              <option value="specific" ${alarm.triggerType==='specific'?'selected':''}>Specific Time</option>
              <option value="after-event" ${alarm.triggerType==='after-event'?'selected':''}>After Event</option>
            </select></div>
          </div>
          <div id="specificGroup" style="${alarm.triggerType==='after-event'?'display:none':''}">
            <div class="form-group"><label>Time (24h)</label><input type="time" id="editTime" value="${alarm.time||'07:00'}"></div>
          </div>
          <div id="afterGroup" style="${alarm.triggerType==='after-event'?'':'display:none'}">
            <div class="form-group"><label>Source Event</label><select id="editAfterSource"><option value="">-- select --</option>${eventSources}</select></div>
            <div class="form-group"><label>Delay (min)</label><input type="number" id="editAfterDelay" value="${alarm.afterEventDelay||5}" min="0" max="120"></div>
            <div class="checkbox-group"><input type="checkbox" id="editShowBetween" ${alarm.showBetweenScreen?'checked':''}><label>Show "between" screen during countdown</label></div>
          </div>

          <div class="section-title">🖥 Desktop Screens</div>
          <div class="form-row">
            <div class="form-group"><label>Primary</label><select id="deskPrimary">${screenOptions.replace(new RegExp(`value="${desk.primary}"`), `value="${desk.primary}" selected`)}</select></div>
            <div class="form-group"><label>Secondary (after action)</label><select id="deskSecondary"><option value="">None</option>${screenOptions.replace(new RegExp(`value="${desk.secondary}"`), `value="${desk.secondary}" selected`)}</select></div>
            <div class="form-group"><label>Between (chain only)</label><select id="deskBetween"><option value="">None</option>${screenOptions.replace(new RegExp(`value="${desk.between}"`), `value="${desk.between}" selected`)}</select></div>
          </div>
          <div class="section-title">📱 Android Screens</div>
          <div class="form-row">
            <div class="form-group"><label>Primary</label><select id="andrPrimary">${screenOptions.replace(new RegExp(`value="${andr.primary}"`), `value="${andr.primary}" selected`)}</select></div>
            <div class="form-group"><label>Secondary</label><select id="andrSecondary"><option value="">None</option>${screenOptions.replace(new RegExp(`value="${andr.secondary}"`), `value="${andr.secondary}" selected`)}</select></div>
            <div class="form-group"><label>Between</label><select id="andrBetween"><option value="">None</option>${screenOptions.replace(new RegExp(`value="${andr.between}"`), `value="${andr.between}" selected`)}</select></div>
          </div>

          <div class="section-title">Sound & Behaviour</div>
          <div class="form-row">
            <div class="form-group"><label>Sound file</label><div style="display:flex;gap:4px;"><span id="soundNameDisplay" style="flex:1;padding:8px;background:var(--surface2);border-radius:var(--radius-sm);">${alarm.soundFileName||'none'}</span><button class="btn btn-outline" id="browseSoundBtn">📁</button></div></div>
            <div class="form-group"><label>Log message on dismiss</label><input type="text" id="editLogMsg" value="${alarm.logMessage||''}" placeholder="Custom log text"></div>
          </div>
          <div class="checkbox-group"><input type="checkbox" id="editDisable" ${alarm.disableAfterAction?'checked':''}><label>Disable screen after final dismiss</label></div>
          <div class="checkbox-group"><input type="checkbox" id="editEnabled" ${alarm.enabled?'checked':''}><label>Alarm enabled</label></div>

          <div class="btn-row">
            <button class="btn btn-primary" id="saveBtn">💾 Save</button>
            <button class="btn btn-test" id="testBtn">▶ Test</button>
            <button class="btn btn-danger" id="deleteBtn">🗑 Delete</button>
          </div>
        `;

        // Attach listeners
        document.getElementById('editTrigger').addEventListener('change', function() {
          document.getElementById('specificGroup').style.display = this.value==='specific'?'':'none';
          document.getElementById('afterGroup').style.display = this.value==='after-event'?'':'none';
        });
        document.getElementById('browseSoundBtn').addEventListener('click', ()=> document.getElementById('soundFileInput').click());
        document.getElementById('saveBtn').addEventListener('click', ()=> saveCurrentAlarm(alarm));
        document.getElementById('testBtn').addEventListener('click', ()=> { saveCurrentAlarm(alarm); triggerAlarm(alarm.id); });
        document.getElementById('deleteBtn').addEventListener('click', ()=> {
          if(confirm('Delete this alarm?')) {
            alarms = alarms.filter(a=>a.id!==alarm.id);
            if(selectedAlarmId===alarm.id) selectedAlarmId = null;
            saveAlarms(); renderAlarmList(); renderEditor(); updatePreview();
            if(alarms.length) selectAlarm(alarms[0].id);
          }
        });
      }

      function saveCurrentAlarm(alarm) {
        alarm.label = document.getElementById('editLabel').value;
        alarm.triggerType = document.getElementById('editTrigger').value;
        if(alarm.triggerType === 'specific') alarm.time = document.getElementById('editTime').value;
        else {
          alarm.afterEventSource = document.getElementById('editAfterSource').value;
          alarm.afterEventDelay = parseInt(document.getElementById('editAfterDelay').value) || 5;
          alarm.showBetweenScreen = document.getElementById('editShowBetween').checked;
        }
        alarm.screens = {
          desktop: {
            primary: document.getElementById('deskPrimary').value,
            secondary: document.getElementById('deskSecondary').value || '',
            between: document.getElementById('deskBetween').value || ''
          },
          android: {
            primary: document.getElementById('andrPrimary').value,
            secondary: document.getElementById('andrSecondary').value || '',
            between: document.getElementById('andrBetween').value || ''
          }
        };
        alarm.disableAfterAction = document.getElementById('editDisable').checked;
        alarm.enabled = document.getElementById('editEnabled').checked;
        alarm.logMessage = document.getElementById('editLogMsg').value;
        saveAlarms(); renderAlarmList(); updatePreview();
      }

      // ═══════════════════════════════════════
      // PREVIEW PANEL
      // ═══════════════════════════════════════
      function updatePreview() {
        const box = document.getElementById('previewBox');
        box.innerHTML = ''; 
        const alarm = alarms.find(a=>a.id===selectedAlarmId);
        if(!alarm) { box.innerHTML = '<span style="color:var(--text2)">Screen Preview</span>'; return; }
        const screenId = getCurrentScreenId(alarm, 'primary');
        if(!screenId) return;
        const screenDef = ScreenRegistry.get(screenId);
        if(!screenDef) return;
        const overlay = document.createElement('div'); overlay.className = 'alarm-overlay'; overlay.style.position='relative';
        overlay.innerHTML = `<div class="icon">🔔</div><div class="time">${formatTime(alarm.time||'--:--')}</div><div class="sub">${alarm.label||''}</div><div id="previewScreenContainer"></div>`;
        box.appendChild(overlay);
        const ctx = { disabled: false, onAction: (type) => { addLogEntry(`[Preview] Action: ${type}`); } };
        screenDef.render(overlay.querySelector('#previewScreenContainer'), ctx);
      }

      function getCurrentScreenId(alarm, slot) { // slot: 'primary','secondary','between'
        const screens = alarm.screens?.[currentPlatform] || {};
        return screens[slot] || (slot==='primary' ? 'simple-dismiss' : '');
      }

      // ═══════════════════════════════════════
      // ALARM TRIGGERING & OVERLAY LOGIC
      // ═══════════════════════════════════════
      function triggerAlarm(alarmId) {
        const alarm = alarms.find(a=>a.id===alarmId);
        if(!alarm || !alarm.enabled) return;
        showAlarmOverlay(alarm);
      }

      function showAlarmOverlay(alarm, isSecondarySequence = false, betweenInfo = null) {
        // Remove any existing overlay
        const previewBox = document.getElementById('previewBox');
        // For full app view, we use the preview panel as display area
        const container = previewBox; // In this mockup, overlay is shown in preview panel
        // Clear previous
        if(container._cleanup) container._cleanup();
        container.querySelectorAll('.alarm-overlay').forEach(el => el.remove());
        activeAlarmOverlay = alarm;

        const screenId = getCurrentScreenId(alarm, isSecondarySequence ? 'secondary' : 'primary');
        if(!screenId) {
          // No screen defined, just dismiss
          finalDismiss(alarm);
          return;
        }
        const screenDef = ScreenRegistry.get(screenId);
        if(!screenDef) return;

        const overlay = document.createElement('div'); overlay.className = 'alarm-overlay';
        overlay.innerHTML = `<div class="icon">🔔</div><div class="time">${formatTime(alarm.time||'--:--')}</div><div class="sub">${alarm.label||''}</div><div class="sound-indicator">🔊 ${alarm.soundFileName||'tone'}</div><div id="overlayScreenContent"></div>`;
        container.appendChild(overlay);
        const screenContainer = overlay.querySelector('#overlayScreenContent');

        const context = {
          disabled: false,
          onAction: (actionType) => {
            addLogEntry(`Action: ${actionType} on alarm "${alarm.label||alarm.id}"`);
            // Check if secondary screen exists
            const secondaryId = getCurrentScreenId(alarm, 'secondary');
            if(secondaryId && !isSecondarySequence) {
              // Transition to secondary screen
              screenDef.cleanup(screenContainer);
              showAlarmOverlay(alarm, true); // recursive call with secondary flag
            } else {
              // Final dismiss
              finalDismiss(alarm);
            }
          }
        };

        // If between-info, override context (for between screen)
        if(betweenInfo) {
          context.betweenSource = betweenInfo.sourceLabel;
          context.betweenTarget = betweenInfo.targetLabel;
        }

        screenDef.render(screenContainer, context);
        container._cleanup = () => screenDef.cleanup(screenContainer);
      }

      function finalDismiss(alarm) {
        addLogEntry(alarm.logMessage || `Alarm "${alarm.label}" dismissed`);
        // Handle chained events
        handleChainedTrigger(alarm.id);
        // Disable after action if set
        if(alarm.disableAfterAction) {
          // In a real app, you'd disable the alarm; here we just mark it
        }
        // Remove overlay
        const container = document.getElementById('previewBox');
        if(container._cleanup) container._cleanup();
        container.querySelectorAll('.alarm-overlay').forEach(el => el.remove());
        activeAlarmOverlay = null;
        updatePreview(); // restore preview
      }

      function handleChainedTrigger(sourceAlarmId) {
        const chained = alarms.filter(a => a.triggerType==='after-event' && a.enabled &&
          (a.afterEventSource === sourceAlarmId || a.afterEventSource === 'button-click:'+sourceAlarmId));
        chained.forEach(targetAlarm => {
          const sourceAlarm = alarms.find(a=>a.id===sourceAlarmId);
          const delayMs = (targetAlarm.afterEventDelay||1) * 60000;
          addLogEntry(`Chained alarm "${targetAlarm.label}" scheduled in ${targetAlarm.afterEventDelay}min`);

          // Show between-screen if enabled
          if(targetAlarm.showBetweenScreen) {
            const betweenScreenId = getCurrentScreenId(targetAlarm, 'between') || 'between-message';
            const screenDef = ScreenRegistry.get(betweenScreenId);
            if(screenDef) {
              const container = document.getElementById('previewBox');
              // Display a small overlay with between info
              const betweenOverlay = document.createElement('div'); betweenOverlay.className = 'alarm-overlay'; betweenOverlay.style.background='var(--surface)';
              betweenOverlay.innerHTML = `<div id="betweenContent"></div>`;
              container.appendChild(betweenOverlay);
              const ctx = { betweenSource: sourceAlarm?.label||'?', betweenTarget: targetAlarm.label||'?', onAction: ()=>{} };
              screenDef.render(betweenOverlay.querySelector('#betweenContent'), ctx);
              // Remove after delay
              betweenTimeout = setTimeout(() => {
                if(betweenOverlay.parentNode) betweenOverlay.remove();
                triggerAlarm(targetAlarm.id);
              }, delayMs);
              container._betweenCleanup = () => screenDef.cleanup(betweenOverlay.querySelector('#betweenContent'));
            }
          } else {
            // No between screen, just delay then trigger
            setTimeout(() => triggerAlarm(targetAlarm.id), delayMs);
          }
        });
      }

      // ═══════════════════════════════════════
      // EVENT LISTENERS & INIT
      // ═══════════════════════════════════════
      function setupUI() {
        // Platform switch
        document.querySelectorAll('#platformSwitch button').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('#platformSwitch button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            currentPlatform = btn.dataset.mode;
            renderAlarmList();
            updatePreview();
            if(activeAlarmOverlay) {
              // Re-render overlay if active
              const alarm = activeAlarmOverlay;
              const container = document.getElementById('previewBox');
              if(container._cleanup) container._cleanup();
              container.querySelectorAll('.alarm-overlay').forEach(e=>e.remove());
              showAlarmOverlay(alarm);
            }
          });
        });

        // Time format switch
        document.querySelectorAll('#timeFormatSwitch button').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('#timeFormatSwitch button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            timeFormat = btn.dataset.format;
            saveSettings();
            renderAlarmList();
            updatePreview();
          });
        });

        // Log toggle
        document.getElementById('logToggleBtn').addEventListener('click', () => {
          document.getElementById('logPanel').classList.toggle('show');
        });

        // Add alarm
        document.getElementById('addAlarmBtn').addEventListener('click', () => {
          const newAlarm = {
            id: 'a'+Date.now(), label: 'New Alarm', time: '08:00', triggerType: 'specific',
            afterEventSource: '', afterEventDelay: 5,
            screens: {
              desktop: { primary: 'simple-dismiss', secondary: '', between: '' },
              android: { primary: 'swipe-dismiss', secondary: '', between: '' }
            },
            soundFileName: 'default.mp3', disableAfterAction: true, logMessage: '',
            showBetweenScreen: false, enabled: true
          };
          alarms.push(newAlarm);
          saveAlarms(); renderAlarmList(); selectAlarm(newAlarm.id);
        });

        // Sound file input
        document.getElementById('soundFileInput').addEventListener('change', function() {
          const file = this.files[0];
          if(file) {
            const alarm = alarms.find(a=>a.id===selectedAlarmId);
            if(alarm) { alarm.soundFileName = file.name; saveAlarms(); renderEditor(); updatePreview(); }
            document.getElementById('soundNameDisplay').textContent = file.name;
          }
        });

        // Keyboard shortcut: Escape to dismiss active alarm
        document.addEventListener('keydown', (e) => {
          if(e.key === 'Escape' && activeAlarmOverlay) {
            finalDismiss(activeAlarmOverlay);
          }
        });
      }

      function init() {
        loadSettings();
        loadAlarms();
        // Apply time format button state
        document.querySelectorAll('#timeFormatSwitch button').forEach(b => {
          b.classList.toggle('active', b.dataset.format === timeFormat);
        });
        renderAlarmList();
        if(alarms.length > 0) selectAlarm(alarms[0].id);
        renderLog();
        setupUI();
        console.log('⏰ Enhanced Alarm App ready.');
        console.log('  - Separate screen chains for Desktop/Android');
        console.log('  - Primary -> Secondary screen flow');
        console.log('  - "Between alarms" screen for chained events');
        console.log('  - Action log panel');
        console.log('  - 24h/12h toggle');
        console.log('  - Screen registry ready for external files');
      }

      init();
    })();
  </script>
</body>
</html>
