<div class="screen-test">
  <p>Test screen</p>
  <button id="test-dismiss">Dismiss</button>
</div>

<script>
window.__screenDef = {
  js: function(container, context) {
    console.log('Test screen js called');
    const btn = container.querySelector('#test-dismiss');
    btn.addEventListener('click', () => context.onAction('test'));
  },
  cleanup: function(container) {
    container.innerHTML = '';
  }
};
</script>
