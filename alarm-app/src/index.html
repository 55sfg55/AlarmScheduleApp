<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alarm App</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <!-- Sidebar: alarm list -->
  <aside id="sidebar" class="sidebar-visible">
    <div class="sidebar-header">⏰ Alarms</div>
    <div id="alarmList" class="alarm-list"></div>
    <button id="addAlarmBtn" class="add-btn">+ New Alarm</button>
  </aside>

  <!-- Main content area -->
  <main id="main">
    <!-- Top bar with toggles -->
    <div id="topbar">
      <button id="sidebarToggleBtn" class="icon-btn" title="Toggle sidebar">☰</button>
      <div class="toggles">
        <div class="toggle-group" id="platformToggle">
          <button data-mode="desktop" class="active">🖥 Desktop</button>
          <button data-mode="android">📱 Android</button>
        </div>
        <div class="toggle-group" id="timeFormatToggle">
          <button data-format="24h" class="active">24h</button>
          <button data-format="12h">12h</button>
        </div>
      </div>
      <!-- View switch button -->
      <button id="viewSwitchBtn" class="icon-btn" title="Switch to App view">📱</button>
    </div>

    <!-- Editor view (default) -->
    <div id="editorView" class="view active">
      <div id="editorPanel" class="panel"></div>
      <div id="previewPanel" class="panel">
        <div id="previewBox">Screen Preview</div>
      </div>
    </div>

    <!-- App view (full-screen alarm display) -->
    <div id="appView" class="view">
      <div id="appDisplay"></div>
    </div>

    <!-- Log panel (bottom) -->
    <div id="logPanel">
      <button id="logToggle">📋 Log</button>
      <div id="logContent"></div>
    </div>
  </main>

  <!-- Hidden file input for sound selection -->
  <input type="file" id="soundFileInput" accept="audio/*" style="display:none"/>

  <!-- Scripts -->
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/alarmStore.js"></script>
  <script type="module" src="js/screenLoader.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
